<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendamiento de citas</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Agendamiento de citas</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="admin-dashboard.php">Dashboard administrativo</a>
        </nav>
    </header>

    <main>
        <!-- Formulario para agendar cita -->
        <section class="bloque">
            <h2>Nueva cita</h2>
 <form action="../php/citas.php" method="POST">
    <div class="campo">
        <label for="adulto_id">ID del adulto mayor</label>
        <input type="number" id="adulto_id" name="adulto_id" required>
    </div>

    <div class="campo">
        <label for="familiar_id">ID del familiar</label>
        <input type="number" id="familiar_id" name="familiar_id" required>
    </div>

    <div class="campo">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha" required>
    </div>

    <div class="campo">
        <label for="hora">Hora</label>
        <input type="time" id="hora" name="hora" required>
    </div>

    <div class="campo">
        <label for="motivo">Motivo de la visita</label>
        <textarea id="motivo" name="motivo" rows="3" required></textarea>
    </div>

    <button type="submit">Agendar cita</button>
</form>
        </section>

        <!-- Si quieres, aquí puedes dejar la tabla del frontend con JS,
             pero la parte importante para la BD ya está con el formulario -->
    </main>
</body>
</html>
